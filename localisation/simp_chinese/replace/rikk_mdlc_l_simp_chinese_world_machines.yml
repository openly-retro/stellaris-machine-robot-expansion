 rikk_mdlc_d_world_machine_core_storage: "§P被遗忘的深层存储§!"
 rikk_mdlc_d_world_machine_core_storage_desc: "古老的记录显示，在这台世界型巨械建造之初，这里曾设立过一处存储站点；而近期发现的其他记录表明，那里可能存放着世界型巨械核心的休眠备份。"
 rikk_mdlc_d_world_machine_core_storage_tooltip: "§P必须进行人工清理！\n§!$oxr_mdlc_wm_core_tip_plural$§Y+1§!"
 rikk_mdlc_wm_event.1320.title: "发现了世界型巨械核心"
 rikk_mdlc_wm_event.1320.desc: "废墟清理作业发掘出了一个$oxr_mdlc_wm_core_tip$！\n\n$oxr_mdlc_regulatory_node$报告称，该核心功能完好。这台庞大的核心中满是资源，它已准备就绪，可自动将一颗行星改造为我们的下一个殖民地。\n\n§Y剩下要做的就是将它部署下去。你可以在§!§H行星决议界面§!§Y进行操作，也可以§!§H使用工程船的“建造巨构”指令§!§Y。§!"
 rikk_mdlc_wm_event.1320.a: "那是谁留下的？"
 RIKK_MDLC_ORIGIN_WM_CORE_DISCOVERED_MESSAGE_TITLE: "发现了世界型巨械核心！"
 RIKK_MDLC_ORIGIN_WM_CORE_DISCOVERED_MESSAGE: "§Y$RIKK_MDLC_ORIGIN_WM_CORE_DISCOVERED_PLANET$§!上发现了一个巨大的核心，它已被转移至库存中。"
 council_agenda_rikk_mdlc_origin_world_machine_core_reverse_engineering_name: "逆向工程"
 council_agenda_rikk_mdlc_origin_world_machine_core_reverse_engineering_desc: "我们将动用此世代最顶尖的电路系统，细致复刻首都的世界型巨械核心的每一处独立部件并重新组装，哪怕为此搁置其他所有关键任务也再所不惜。"
 council_agenda_rikk_mdlc_origin_world_machine_core_reverse_engineering_tooltip: "$oxr_mdlc_wm_core_tip_plural$ §Y+1§!"
 council_agenda_rikk_mdlc_origin_world_machine_core_aggressive_engineering_name: "侵入性工程"
 council_agenda_rikk_mdlc_origin_world_machine_core_aggressive_engineering_desc: "我们将动用本世代最顶尖的电路系统，专注于世界机器核心的建造，而将其他关键任务一概搁置。"
