l_simp_chinese:
 rikk_mdlc_decision_world_machine_solidify_molten: "世界型巨械：熔融星球地表固化"
 rikk_mdlc_decision_world_machine_solidify_molten_desc: "这颗熔融星球拥有庞大的热能供应，可以作为工业类世界型巨械的基础。不过，熔化的岩浆地表对工程建设构成了严峻的挑战。\n\n得益于行星地质物理学领域取得的进步，我们知晓该如何置入巨型冷却棒形态的特殊散热器，让大部分地表区域稳定到足以开展建设的程度。"
 rikk_mdlc_decision_world_machine_solidify_molten_effect: "该行星的地壳会被改造成适宜安置世界型巨械核心的环境。"
 rikk_mdlc_world_machine_molten_mod: "凝固熔融星球"
 rikk_mdlc_world_machine_molten_mod_desc: "火焰喷发与流淌的熔岩在该星球一度随处可见；现在，这里的地壳已经稳定下来，足以建立工业化。冷却过程中留下的丰富天然资源，对未来的产业会是巨大的助益。"
 MESSAGE_MOLTEN_WORLD_SOLIDIFIED: "§Y$RIKK_MDLC_UPGRADE_TARGET$$§!已经完成地壳固化，可以建立世界型巨械。"
 rikk_mdlc_decision_world_machine_defrost_cryosphere: "世界型巨械：冰雪圈解冻"
 rikk_mdlc_decision_world_machine_defrost_cryosphere_desc: "我们将消耗大量能源，利用我们在热力学与热传递应用领域的知识，开启该行星的变暖进程。"
 rikk_mdlc_world_machine_frozen_mod: "冰雪圈消融"
 rikk_mdlc_world_machine_frozen_mod_desc: "昔日的冰封星球，现在已经充分升温并稳定下来，可以建立世界型巨械。"
 MESSAGE_FROZEN_WORLD_DEFROSTED: "§Y$RIKK_MDLC_UPGRADE_TARGET$§!已经充分升温，可以建立世界型巨械。"
 rikk_mdlc_decision_world_machine_cleanse_toxic: "世界型巨械：净化毒素"
 rikk_mdlc_decision_world_machine_cleanse_toxic_desc: "剧毒星球是罕见异星复合物的珍贵来源，但这里的环境对大部分金属和有机化合物都过于活泼、过于具有腐蚀性，因而无法开展任何形式的定居或建设。我们会利用§Y$tech_climate_restoration$§!领域的新理论和新应用，消除那些最危险的化学物质危害，将剩余组分转化成工业资源。"
 rikk_mdlc_world_machine_toxic_mod: "环境祛毒"
 rikk_mdlc_world_machine_toxic_mod_desc: "腐蚀性化合物，以及其他对机械有害的化学物质，均已完成惰性化处理。剩下的是海洋大小的稳定矿藏，含有稀有的反应物与催化剂，可被用于生产异星资源。"
 MESSAGE_TOXIC_WORLD_CLEANSED: "§Y$RIKK_MDLC_UPGRADE_TARGET$§!已完成毒素净化，可以建立世界型巨械。"
 rikk_mdlc_decision_world_machine_harness_nanites: "世界型巨械：操控纳米机器人"
 rikk_mdlc_decision_world_machine_harness_nanites_desc: "由于复制限制协议的失效，构成该星球的纳米机器人——具有自我复制能力的微型机械——已经在这里泛滥成灾。为了平息这种过度增长，并建立能够部署世界型巨械核心的行星环境，我们会仔细研究它们的通讯协议，对协议进行覆盖，最终控制虫群为我们所用。"
 MESSAGE_NANITE_WORLD_HARNESSED: "§Y$RIKK_MDLC_UPGRADE_TARGET$§!已纳入掌控，可以建立世界型巨械。"
 rikk_mdlc_world_machine_nanite_mod: "掌控纳米机器人"
 rikk_mdlc_world_machine_nanite_mod_desc: "该星球泛滥的纳米机器人的控制协议已被覆写，它们现在可以对多种命令作出响应。最值得注意的是，这些纳米机器人会被用于提升行星建设速度。"
 rikk_mdlc_decision_world_machine_crust_roots: "§c§!地层扩张1：地壳根系"
 rikk_mdlc_decision_world_machine_crust_roots_desc: "§Y这会解锁更高层次的升级§!\n行星的地表已被开发到了极限。合乎逻辑的下一步骤是开发利用行星的巨大内部空间，开始向地下进行扩张。"
 rikk_mdlc_fail_crust_roots_queued: "£trigger_no£§R开始该项目前，必须已建成地壳根系，或已将地壳根系加入建造队列。§!"
 rikk_mdlc_d_world_machine_crust_roots: "已过时的MDLC资源点"
 rikk_mdlc_decision_world_machine_synchronization_arrays: "§d§!同调设施"
 rikk_mdlc_decision_world_machine_synchronization_arrays_desc: "太空电梯将沿着行星表面的赤道修建，并配有大型指示塔以及位于其顶端的通讯设备。行星的两极则会配置包括巨型天线盘的大型亚空间网络阵列。一经完成，我们将与所有“世界型巨械”阵列建立实时连接。这一同步将改善供给和需求算法，从而改进未来的物流月和物流年。"
 rikk_mdlc_d_world_machine_synchronization_arrays: "$oxr_mdlc_geological$$oxr_wm$同调设施"
 rikk_mdlc_decision_world_machine_synchronization_arrays_effect: "\n每个加入连接的世界型巨械会造成（不含第一个加入连接的星球）：\n$xvcv_mdlc_world_machines_industrial_districts$$OUTPUT$/$upkeep$：§G+3%§!/§R+3%§!\n$xvcv_mdlc_world_machines_raw_resources_districts$$OUTPUT$/$upkeep$：§G+1.5%§!/§R+1.5%§!\n\n§Y连接网络内的其它世界型巨械：[RikkSyncArraysCount]/20§!\n"
 rikk_mdlc_d_world_machine_synchronization_arrays_desc: "于地壳上沿赤道修建的太空电梯和巨型指示塔通讯阵列已将这颗星球与一个巨大网络中的其他世界型巨械相连。与其他世界型机械的同步改进了其需求生成算法，从而改善了其未来的物流月和物流年。\n\n现有技术条件下，网络最多可支持20个互联的行星。"
 rikk_mdlc_decision_world_machine_mantle_roots: "§c§!地层扩张2：地幔根系"
 rikk_mdlc_decision_world_machine_mantle_roots_desc: "§Y此项目能够带来更多的地层升级§!\n随着地壳稳定下来并被纳入我们的工业体系，行星的地幔成为了地层扩张的下一个目标。我们将会使用能承受住地幔的高温高压环境的新科技开凿隧道，在其空间内修建更多的区划。"
 rikk_mdlc_fail_mantle_roots_queued: "£trigger_no£§R开始该项目前，必须已建成地幔根系，或已将地幔根系加入建造队列。§!"
 rikk_mdlc_d_world_machine_mantle_roots: "已过时的MDLC资源点"
 rikk_mdlc_decision_world_machine_mantle_engine: "§d§!大陆稳定引擎"
 rikk_mdlc_decision_world_machine_mantle_engine_desc: "为了使地表与地幔间的构造稳定下来，我们必须要固定住行星地壳的俯冲点和其他可以引发地震、创造山脉的重要构造板块，并在其下的地幔层中修建和配置转向器，以此来控制大陆运动的方向，减少地壳层的摩擦。这会让无需考虑地震活动的设计成为可能，从而大幅降低建造难度。我们的建筑将更容易受到轰炸的伤害。"
 rikk_mdlc_fail_mantle_engine_queued: "£trigger_no£§R开始该项目前，必须已建成大陆稳定引擎，或已将大陆稳定引擎加入建造队列。§!"
 rikk_mdlc_d_world_machine_mantle_engine: "$oxr_mdlc_geological$$oxr_wm$大陆稳定引擎"
 rikk_mdlc_d_world_machine_mantle_engine_desc: "位于行星地幔内的下地壳流控制设施能将汹涌的波流引离构造板块。如果不这么做，这些波流就会引发火山、地震、海啸以及其他毁灭性的现象。"
 rikk_mdlc_decision_world_machine_reinforced_planet: "§d§!加固地表构造"
 rikk_mdlc_decision_world_machine_reinforced_planet_effect: "§Y大陆稳定引擎§!\n    轨道轰炸伤害：§G-30%§!\n\n花费会随区划数量升高。\n世界型巨械区划矿物花费：§R+20%§!"
 rikk_mdlc_decision_world_machine_reinforced_planet_desc: "$oxr_mdlc_legion_node$设计出了能够减少建筑受到的行星轰炸的影响的形状。为了给这些建筑腾出足够的材料，我们将强制拆除那些采用旧形状的建筑。"
 rikk_mdlc_decision_world_machine_mantle_transport_network: "§d§!行星内运输网络"
 rikk_mdlc_decision_world_machine_mantle_transport_network_desc: "巨型列车、输送系统、大气穿梭机，所有这一切都是为支持需要以超凡步伐进行生产的行星的后勤而存在的。如此规模的载具如果仅仅沿行星外围行动，就可能会造成运输系统的拥堵。\n\n为了解决这一问题，我们将会设置固定的运输仓库，并通过行星地幔实现最短距离的连接。货物将被运到地表之下，并被磁悬浮列车迅速送往目的地，从而极大地减少运输时间。"
 rikk_mdlc_d_world_machine_mantle_transport_network: "$oxr_mdlc_geological$$oxr_wm$行星内运输网络"
 rikk_mdlc_d_world_machine_mantle_transport_network_desc: "横贯行星的庞大隧道系统，是连通各个大陆的运输线。在一端投放货物，经过电磁轨道加速后，货物可以直接抵达行星的另一面。"
 rikk_mdlc_d_world_machine_mantle_transport_network_effect: "每个非冷却区划会引发：\n—$xvcv_mdlc_world_machines_industrial_districts$产能：§G+1%§!\n—$xvcv_mdlc_world_machines_industrial_districts$维护费：§R+0.5%§!\n当前效果："
 rikk_mdlc_decision_world_machine_mantle_buses: "§d§!行星内总线网络"
 rikk_mdlc_decision_world_machine_mantle_buses_desc: "我们星球中用于传递信息的粗大超导线缆。它们形似早期的海底电缆，但要大上好几圈。目前它们分布于地壳层中，传输效率不是很好。若我们重新规划这些线路，将它们布置在行星的内部，就能显著缩短传输距离，降低线路的延迟。这会让所有大陆间数据处理都变得极其迅速。"
 rikk_mdlc_d_world_machine_mantle_buses: "$oxr_mdlc_geological$$oxr_wm$行星内总线网络"
 rikk_mdlc_d_world_machine_mantle_buses_desc: "粗大的超导线缆，类似早期的海底电缆，但要大上好几圈。现在这些线缆直接穿过行星地核。线路延迟显著降低，通信效率因而大幅提升，让计算中心的运行速度变得越来越快。"
 rikk_mdlc_d_world_machine_mantle_buses_effect: "每个非冷却区划会引发：\n—$xvcv_mdlc_world_machines_computer_districts$产能：§G+1%§!\n—$xvcv_mdlc_world_machines_computer_districts$维护费：§R+0.5%§!\n当前效果："
 rikk_mdlc_decision_world_machine_outer_core_roots: "§c§!地址扩张3：外层地核根系"
 rikk_mdlc_decision_world_machine_outer_core_roots_desc: "我们已经触及地幔扩张技术的极限，并开发出了最合理的改进方案。生产力的提升使得地幔中作业成为可能。合理的下一步行动是进军地核外层，这会带来由更高的温度与更大的压力引发的各种挑战。我们将继续深入，在此过程中收获新的技术与洞见。"
 rikk_mdlc_fail_outer_core_roots_queued: "£trigger_no£§R开始该项目前，必须已建成外层地核根系，或已将地壳根系加入建造队列。§!"
 rikk_mdlc_d_world_machine_outer_core_roots: "已过时的MDLC资源点"
 rikk_mdlc_decision_world_machine_outer_core_tap: "$oxr_mdlc_geological$$oxr_wm$地核外层汲取设施"
 rikk_mdlc_decision_world_machine_outer_core_tap_desc: "行星地核可以提供巨量的热量与材料。我们会在地核外层的稳定站附近安装能量汇聚设备。这些设备可以将热量转化为可用的能源，也能将捕获的热量供应给铸造厂使用。"
 rikk_mdlc_d_world_machine_outer_core_tap: "$oxr_mdlc_geological$$oxr_wm$地核外层汲取设施"
 rikk_mdlc_d_world_machine_outer_core_tap_desc: "深埋于地核外层的特殊热电捕获站，收集电力和热量以供生产之用。"
 rikk_mdlc_decision_world_machine_outer_core_cooling: "§d§!$oxr_wm$地核外层冷却设施"
 rikk_mdlc_decision_world_machine_outer_core_cooling_desc: "行星地核的极端温度与压力，让扩展计算区划变得相当困难。所需的隔热措施多得让我们难以执行扩展作业。但是，我们可以将地核外层的温度降低到足以安装数据传输线路和其他组件，而无需使用成本过于高昂的隔热措施的程度。通过抑制某些区域的摩擦和运动，并施加适度的隔热措施，我们可以创造出一些“口袋区域”。这些区域最终会被冷却并挖去，为计算区扩展腾出空间。"
 rikk_mdlc_d_world_machine_outer_core_cooled: "$oxr_mdlc_geological$$oxr_wm$地核外层冷却设施"
 rikk_mdlc_d_world_machine_outer_core_cooled_desc: "行星的地核外层区域安装了64座冷却站。这些重重防护的区域为前沿研究提供了绝佳的环境。它们所处的战略位置足以让地表发出的讯息以最短路线实现最长距离的传输。"
 rikk_mdlc_world_machine_outer_core_cooling_mod: "行星地核外层区域正在安装冷却站，这略微扰乱了现有的冷却区划。"
 rikk_mdlc_decision_world_machine_inner_core_roots: "§c§!内层地核根系"
 rikk_mdlc_decision_world_machine_inner_core_roots_desc: "接下来的工程学挑战是继续向地核内部进发——那是由广泛的普通金属与稀有合金物质组成的流动熔融体。我们的机械和专用设施已经占据了行星的主体。处理行星重核是我们要进行的最后一步。这样可以提高生产能力。我们可以选择深入地核继续开发，也可以选择保留这一部分的原貌。"
 rikk_mdlc_fail_inner_core_roots_queued: "£trigger_no£§R开始该项目前，必须已建成内层地核根系，或已将地壳根系加入建造队列。§!"
 rikk_mdlc_d_world_machine_inner_core_roots: "已过时的MDLC资源点"
 rikk_mdlc_fail_inner_core_project_queued: "£trigger_no£§R存在已建成或已预定建造的地核项目。§!"
 rikk_mdlc_fail_inner_core_project_queued_1: "£trigger_no£§R存在已建成或已预定建造的地核项目。§!"
 rikk_mdlc_fail_inner_core_project_queued_2: "£trigger_no£§R存在已建成或已预定建造的地核项目。§!"
 rikk_mdlc_decision_world_machine_inner_core_tap: "§d§!地核内层汲取设施"
 rikk_mdlc_decision_world_machine_inner_core_tap_desc: "§Y与$rikk_mdlc_decision_world_machine_core_core$互斥。\n如果您建造了一个植入核心，那么它会替换该资源储备。§!\n我们会从行星的核心中抽取资源和能源。这将大大提升行星的生产能力，同时还会成为重要的原材料来源。"
 rikk_mdlc_d_world_machine_inner_core_tap: "$oxr_mdlc_geological$$oxr_wm$地核内层汲取设施"
 rikk_mdlc_d_world_machine_inner_core_tap_desc: "§Y与$rikk_mdlc_situation_core_core$互斥。\n如果您建造了一个植入核心，那么它会替换该资源储备。§!\n行星内核中蕴藏的丰富物质资源已被开发利用。"
 rikk_mdlc_decision_world_machine_core_core: "§d§!控制核心升级"
 rikk_mdlc_decision_world_machine_core_core_desc: "§Y与$rikk_mdlc_decision_world_machine_inner_core_tap$互斥§!\n利用对行星进行地质改良时所积累的数据，我们可以探索关于生产性能提升的统一理论，最终实现世界型巨械核心的改造与设计翻新，从而进一步提升行星的产出水平。物理学表明，行星地核是部署新一代超级计算机的理想地点。"
 rikk_mdlc_situation_core_core: "控制核心升级"
 rikk_mdlc_situation_core_core_type: "世界型巨械升级"
 rikk_mdlc_d_world_machine_core_core: "正常运作的2型世界型巨械核心"
 rikk_mdlc_d_world_machine_core_core_desc: "$oxr_mdlc_d_world_machine_core_desc$"
 rikk_mdlc_situation_core_core_monthly_change_tooltip: "世界型巨械核心安装向导预估：9999年"
 rikk_mdlc_approach_abort: "终止升级"
 rikk_mdlc_approach_abort_effect: "§R结束扩张生产设施并升级世界型巨械核心的尝试！§!"
 rikk_mdlc_approach_normal: "按既定方针执行"
 rikk_mdlc_approach_normal_effect: "每月进度§G+10§!"
 rikk_mdlc_approach_normal_desc: "标准、安全、可预测的方法，没有明显的优缺点。"
 rikk_mdlc_approach_extra: "加快作业"
 rikk_mdlc_approach_extra_effect: "每月进度§G+20§!"
 rikk_mdlc_approach_extra_desc: "不考虑材料成本和行星稳定，以此换取更快的成果。这会导致资源浪费。"
 rikk_mdlc_approach_cooling_district: "冷却区划互联"
 rikk_mdlc_approach_cooling_district_effect: "每月进度§G+40§!"
 rikk_mdlc_approach_cooling_district_desc: "将冷却区划征作他用。以冷却区划的效率为代价，提高制造与组装效率。"
 rikk_mdlc_d_world_machine_core_refuse: "行星地核临时存放点"
 rikk_mdlc_d_world_machine_core_refuse_desc: "一部分行星内部物质被临时存放在这里，等待清理。它们会被自动挖掘设备运离地幔。目前，设备正在从丰富的废料中筛选可用的材料。"
 rikk_mdlc_stage_core_core_implanting: "世界型巨械核心安装"
 rikk_mdlc_stage_core_core_carving: "世界型巨械核心安装"
 rikk_mdlc_situation_core_core_complete: "2型世界型巨械核心已完成"
 sm_rikk_mdlc_world_machine_dyson_deflector: "戴森能量偏转塔"
 sm_rikk_mdlc_world_machine_dyson_deflector_desc: "不同波段的辐射会先被聚焦并传输至恒星基地的$rikk_mdlc_world_machine_dyson_receiver$中，经过收集和去噪后，再输送至目标行星。"
 sm_rikk_mdlc_world_machine_dyson_receiver: "戴森能量接收阵列"
 sm_rikk_mdlc_world_machine_dyson_receiver_desc: "该阵列会捕捉从恒星偏折而来的各类强大辐射束，过滤和阻拦可能有害的波段（如X射线），再传输给行星的太阳能电站。§L接收恒星能量并注入世界型巨械存在一定的风险，但还在可接受的范围内。巨械核心当前的运转速度正在不断提升。§!\n§R如果接受能量超出接收器的上限，则会产生巨大的维护成本！§!"
 rikk_mdlc_requires_full_dyson_sphere: "恒星系中须有已完工的戴森球。"
 rikk_mdlc_requires_additional_pylons: "建造更多$rikk_mdlc_world_machine_dyson_deflector$！"
 rikk_mdlc_tech_world_machine_dyson: "戴森能量偏转"
 rikk_mdlc_tech_world_machine_dyson_desc: "足够坚固的偏转器，大型接收器，强大的电容器与变电站阵列——若是有这些设施来分配负载，我们就可以把戴森球的能量以中转方式输送到世界型巨械的星环基地能源设施中。这会提升行星的生产能力。"
 mod_rikk_mdlc_world_machine_dyson_sphere_receiver_max: "戴森球接收阵列上限"
 rikk_mdlc_decision_world_machine_convert_pc_molten_on_queued_modifier: "板块构造工程（进行中）"
 rikk_mdlc_decision_world_machine_convert_pc_molten_on_queued_modifier_desc: "一部分熔融地壳会被冷却并固化，为自动机械星球的转化做准备。"
 rikk_mdlc_decision_world_machine_convert_pc_frozen_on_queued_modifier: "大气与水圈暖化（进行中）"
 rikk_mdlc_decision_world_machine_convert_pc_frozen_on_queued_modifier_desc: "这颗星球会逐渐升温，为自动机械星球的转化做准备。"
 rikk_mdlc_decision_world_machine_convert_pc_toxic_on_queued_modifier: "大气与地表净化（进行中）"
 rikk_mdlc_decision_world_machine_convert_pc_toxic_on_queued_modifier_desc: "腐蚀性的毒素和化学物会受到中和处理，为自动机械星球的转化做准备。"
 rikk_mdlc_decision_world_machine_defrost_cryosphere_effect: "$rikk_mdlc_decision_world_machine_convert_pc_frozen_on_queued_modifier_desc$"
 rikk_mdlc_decision_world_machine_cleanse_toxic_effect: "$rikk_mdlc_decision_world_machine_convert_pc_toxic_on_queued_modifier_desc$"
 rikk_mdlc_decision_world_machine_convert_pc_gray_goo_on_queued_modifier: "正在控制纳米机器人"
 rikk_mdlc_decision_world_machine_convert_pc_gray_goo_on_queued_modifier_desc: "仔细研究纳米机器人的通讯协议，对协议进行覆盖，并重新利用纳米虫群，实现自动机械星球的转化。"
 rikk_mdlc_decision_world_machine_outer_core_cooling_effect: "完成后：\n添加§Y已冷却的世界型巨械外层地核§!资源储备：\n—世界型巨械计算区划产出：§G+10%§!\n—世界型巨械计算区划£energy£维护费：§G-10%§!"
 rikk_mdlc_decision_world_machine_core_core_effect: "局势结束后：\n添加§Y$rikk_mdlc_d_world_machine_core_core$§!\n—$mod_rikk_mdlc_world_machine_districts_efficiency$：§G+25%§!\n—维护费：£energy£§R-50§!"
 rikk_mdlc_tech_world_machine_dyson_upgrade_tooltip: "新的恒星基地建筑：['starbase_module:rikk_mdlc_world_machine_dyson_deflector']\n新的星环基地建筑：['starbase_module:rikk_mdlc_world_machine_dyson_receiver']"
 sm_rikk_mdlc_world_machine_dyson_deflector_O: "O型$sm_rikk_mdlc_world_machine_dyson_deflector$，"
 sm_rikk_mdlc_world_machine_dyson_deflector_O_desc: "$sm_rikk_mdlc_world_machine_dyson_deflector_desc$"
 rikk_mdlc_world_machine_exhibits: "文物整合"
 rikk_mdlc_decision_world_machine_exhibits: "文物整合"
 rikk_mdlc_decision_world_machine_exhibits_desc: "稀有文物的异星启迪提供了独特的随机数种子。可以将这些种子置入常规治理算法，从而提升效率、产生洞见。"
 rikk_mdlc_situation_core_upgrade_stage_1: "§H组件与材料制造§!"
 rikk_mdlc_situation_core_upgrade_stage_1_desc: "正在为新的行星设施和世界型巨械核心组件制造零部件与供应品：高容量轨道管、更大的液压泵、更粗的通信线缆，还有用于世界型巨械核心的大型外壳、反应堆和计算机模块。"
 rikk_mdlc_situation_core_upgrade_stage_2: "临时设施挖掘"
 rikk_mdlc_situation_core_upgrade_stage_2_desc: "§H临时的设施与准备工作§!\n\n正在围绕现有设施展开大规模挖掘。正在部署临时的行星通讯、运输设施与服务。正在对世界型巨械核心进行运行前的整备。"
 rikk_mdlc_situation_core_upgrade_stage_3: "安装与升级"
 rikk_mdlc_situation_core_upgrade_stage_3_desc: "所有的改良管路、隧道、泵送装置、数据中心、运输车、雷达等设备，正在逐步投入运行。正在将新外壳安装至世界型巨械核心，以通过新线路实现更高带宽的通讯。正在对行星内部各个深度的地址升级措施进行同步，以实现更高的产出。"
 rikk_mdlc_approach_stage_2_standard: "稳定挖掘速率"
 rikk_mdlc_approach_stage_2_standard_desc: "挖掘工作按计划进行，正在处理被挖出的物质。临时设施状态良好。"
 rikk_mdlc_approach_stage_2_dumping_grounds: "破坏性挖掘"
 rikk_mdlc_approach_stage_2_dumping_grounds_effect: "每月进度§G+40§!\n§R碎片会覆盖行星，封堵5个区划。§!\n§Y只会触发一次。§!"
 rikk_mdlc_approach_stage_2_dumping_grounds_desc: "我们会将现代爆破技术用于场地挖掘。挖掘出的物质要过一些时间才会处理。任何给定时间下，临时设施的效率都将处于80%~95%的区间内。"
 rikk_mdlc_situation_core_upgrade_phase_1: "核心升级：信号改道"
 rikk_mdlc_situation_core_upgrade_phase_1_desc: "正在对行星的通讯与运输设施进行临时重规划，以便进行升级。"
 rikk_mdlc_situation_core_upgrade_phase_2: "核心升级：组件生产"
 rikk_mdlc_situation_core_upgrade_phase_2_desc: "正在为新的行星设施和世界型巨械核心组件制造零部件与供应品。"
 rikk_mdlc_situation_core_upgrade_phase_3: "核心升级：最终安装"
 rikk_mdlc_situation_core_upgrade_phase_3_desc: "正在将新的行星通讯与生产设施安装到世界型巨械核心中。"
 rikk_mdlc_approach_stage_3_acceleration: "提升后勤供应"
 rikk_mdlc_approach_stage_3_acceleration_effect: "每月进度§G+40§!"
 rikk_mdlc_approach_stage_3_acceleration_desc: "将行星产能用于通讯与运输活动的重新规划。"
 rikk_mdlc_decision_terraform_hazardous_world_note: "\n§G部署后§!：§H该星球的地质条件不合标准，建立殖民地后仍可能存在一些缺陷。§!"
 rikk_mdlc_planet_dyson_receiver_active: "活跃中的轨道戴森接收器"
 rikk_mdlc_planet_dyson_receiver_active_desc: "该行星的星环基地目前安装有§Y[This.rikk_mdlc_planet_dyson_receiver_count]个§!戴森接收器，可使行星产能提升§G[This.rikk_mdlc_planet_dyson_receiver_boost_effect_var]%§!"
 MESSAGE_RIKK_MDLC_WM_UPGRADE_FAILED_TITLE: "世界型巨械升级失败！"
 RIKK_MDLC_WM_UPGRADE_FAILED: "一项预定在§Y$RIKK_MDLC_UPGRADE_TARGET$§!进行的世界型巨械升级因建造故障而失败！"
