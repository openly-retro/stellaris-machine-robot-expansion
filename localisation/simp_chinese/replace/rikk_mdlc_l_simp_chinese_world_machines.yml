 rikk_mdlc_category_null: "没有MDLC分类"
 rikk_mdlc_wm_event.141.name: "纳米星球"
 rikk_mdlc_wm_event.141.desc: "L-星团内部的纳米星球可以成为世界型巨械的扩张目标。我们可以控制这些纳米机器群，用于促进环境改造和行星建设。$oxr_mdlc_growth_node$已经确认，纳米机器人在世界型巨械的自动部署与建设方面拥有惊人的潜力。\n§S可利用一项特殊决议，将L-星门内的任意纳米星球转变为世界型巨械候选。§!"
 rikk_mdlc_wm_event.141.a: "正在处理信息。"
 rikk_mdlc_wm_event.142.desc: "我们没有发现任何传说中的星门建立者留下的荒芜废土。我们对这个文明知之甚少。不过，如果我们发现了任何被这些古老纳米机械覆盖的行星——据$oxr_mdlc_growth_node$推断——就可以将它们用于直接组装世界型巨械，这能带来惊人的组装速度。\n§S可利用一项特殊决议，将L-星门内的任意纳米星球转变为世界型巨械候选。§!"
 rikk_mdlc_wm_event.142.a: "正在处理信息。"
 rikk_mdlc_calcite_deposits_mod: "方解石矿藏"
 rikk_mdlc_calcite_deposits_mod_desc: "这颗行星的地壳中会涌出含钙分子的喷泉，在地表部分地区形成巨大的雪状覆盖层。这些残留物可被加工成基础构造材料。"
 rikk_mdlc_lightning_delta_mod: "闪电三角洲"
 rikk_mdlc_lightning_delta_mod_desc: "这颗熔融星球上曾经最大的一处火山脉现已冷却，但随着熔岩流一同冷却的各种矿物却引发了大范围的持续性电磁扰动。雷暴频繁地侵袭该区域，不仅干扰了电子通信与设备，还孕育出了一种名为“闪电熔岩”的罕见天然结晶体。"
 rikk_mdlc_pyroclastic_surges_mod: "火成涌流"
 rikk_mdlc_pyroclastic_surges_mod_desc: "此处地面因地下气体与岩石的涌动而不甚稳定，压力积聚时便会随机喷发。这些危险的喷发既会定期将新的资源带至地表，也可通过大规模过滤的方式被纳入工业用途。"
 rikk_mdlc_chemical_glacier_mod: "化学冰川"
 rikk_mdlc_chemical_glacier_mod_desc: "在该星球的某一区域，大量化学物质被封存或凝结在了巨大的冰川构造之中。这些奇特的构造具有科研价值，不过，通过融化这些冰川并将其用于加工基础填充材料，我们同样能获得丰厚的收益。"
 rikk_mdlc_hydrocarbon_sea_mod: "碳氢海"
 rikk_mdlc_hydrocarbon_sea_mod_desc: "在地壳下方，存在着一片广阔的化学物质（很可能源于有机物）海洋，它们在温度和压力的作用下被压缩成了液态。这些物质有着极大的效用，我们不仅可以将其作为燃料燃烧，还能将其加工成实用的聚合物包装材料，从而便利货物的运输。"
 rikk_mdlc_natural_super_geyser_mod: "超级间歇泉"
 rikk_mdlc_natural_super_geyser_mod_desc: "受潮汐压力的作用，一口巨大的间歇泉会周期性地将星球内部的液态物质高高喷射至大气层外。在岩层裂隙中奔流的巨大能量，将该星球上的一部分物质资源转化成了特殊的矿床；与此同时，这口间歇泉本身也可以作为传统冷却手段的替代方案。"
 rikk_mdlc_sulfur_geysers_mod: "硫磺间歇泉"
 rikk_mdlc_sulfur_geysers_mod_desc: "这颗星球的部分区域被浓密的硫化物（包含硫化氢）云团所笼罩，这些气体是由众多古老的环境进程排放产生的。那些现已停止活动的排放源中富含化学资源，可供各类工业加以利用。"
 rikk_mdlc_bacterium_sea_mod: "细菌海"
 rikk_mdlc_bacterium_sea_mod_desc: "在这颗星球上，我们发现了一片由高度特化的细菌构成的广阔海洋。尽管在行星改造过程中，它们大部分都已被杀死，但其留下的生物质可被用作肥料。此外，我们还有另一种选择：培育并利用这种细菌的基因改造变种，将其构建成一台庞大而奇特的生物计算机，我们或许能借此获得全新的构想。"
 rikk_mdlc_acidic_basin_mod: "酸性盆地"
 rikk_mdlc_acidic_basin_mod_desc: "历经数千年的岁月，一片面积堪比次大陆的巨大盆地中，孕育出了种类繁多的多晶体。这些晶体既可以作为构造材料使用，也可作为加工特殊资源时的补充耗材。"
 rikk_mdlc_d_world_machine_roots_1: "$oxr_mdlc_geological$$oxr_wm$地壳根系"
 rikk_mdlc_d_world_machine_roots_1_desc: "巨大的几何构造将地表与行星地壳深处相连。该构造的大部分用于提供支撑，而空余空间则已被划作区划扩建之用。由于温度略微偏高，区划的维护费用有所增加。"
 rikk_mdlc_d_world_machine_roots_2: "$oxr_mdlc_geological$$oxr_wm$地幔根系"
 rikk_mdlc_d_world_machine_roots_2_desc: "巨大的构造体缓解了行星上地幔的压力与高温，从而得以扩展世界型巨械的生产能力。"
 rikk_mdlc_wm_event.130.name: "强化世界型巨械"
 rikk_mdlc_wm_event.130.desc: "$oxr_mdlc_legion_node$先前曾提交过数份报告，指出大陆稳定引擎让行星建筑构造更容易受到轰炸破坏。最近的轰炸证明了节点的观点。节点已经设计出一种能够在不影响建造速度的情况下，提升建筑抗轰炸能力的规划与建造方法。我们理应在行星上贯彻这些加固措施。"
 rikk_mdlc_wm_event.130.a: "强化与进步。"
 rikk_mdlc_wm_event.130.a.tooltip: "§S解锁一项能够强化我方星球的决议。§!"
 rikk_mdlc_d_world_machine_roots_3: "$oxr_mdlc_geological$$oxr_wm$外层地核根系"
 rikk_mdlc_d_world_machine_roots_3_desc: "下地幔与外地核之间的过渡带沿线中，已有多个节点安装了稳定化基础设施。这些设施受特制隔热盾保护，并采用高压建造技术进行了加固。此外，它们还应用了分形设计，来均匀分散极端环境所带来的巨大压力。"
 rikk_mdlc_d_world_machine_roots_4: "$oxr_mdlc_geological$$oxr_wm$内层地核根系"
 rikk_mdlc_d_world_machine_roots_4_desc: "八座重重防护的站点贯穿了行星核心，内置的耐熔材料与导热系统可确保其稳固运行。"
 rikk_mdlc_wm_event.20.name: "阶段1完成，开始阶段2"
 rikk_mdlc_wm_event.20.desc: "§H对策发生改变！§!\n\n已制造完成：通讯中继站、运输网络、供应线路，以及大型世界型巨械核心的部件。作业场地已准备就绪，可以开始挖掘工作。将启用临时网络，重新规划所有活动，为新设施的安装做准备。"
 rikk_mdlc_wm_event.20.a: "信息处理完成。继续进行。"
 rikk_mdlc_wm_event.20.b: "关闭此类警告。"
 rikk_mdlc_wm_event.30.name: "阶段2完成，开始阶段3"
 rikk_mdlc_wm_event.30.desc: "§H对策发生改变！§!\n\n现有设施已转移至临时网络。第2代世界型巨械核心的部件安装工作即将开始，将部署并激活所有新设施将。"
 rikk_mdlc_wm_event.30.a: "明白。"
 rikk_mdlc_wm_event.30.b: "关闭这些警报。"
 rikk_mdlc_wm_event.40.name: "2型世界型巨械核心安装完毕"
 rikk_mdlc_wm_event.40.desc: "第二版世界型巨械核心（2型）已成功安装，世界型巨械的产出再次获得提升。$oxr_mdlc_cognitive_node$将持续计算可能的升级路径。"
 rikk_mdlc_wm_event.40.a: "模拟掌声。"
 rikk_mdlc_wm_event.40.b: "关闭这些警报。"
 rikk_mdlc_decision_world_machine_structured_world: "§c§!地层扩张：构造体世界"
 rikk_mdlc_decision_world_machine_structured_world_desc: "世界型巨械深度升级的巅峰：一颗由回火合金取代岩石与岩浆构成的行星。"
 rikk_mdlc_d_world_machine_roots_5: "$oxr_mdlc_geological$$oxr_wm$构造体世界"
 rikk_mdlc_d_world_machine_roots_5_desc: "这颗星球已是一台名副其实的“世界型巨械”。尽管出于各种目的，这里仍保留了大量的行星物质储备，但如今，它身上“机器”的成分已然多过了“星球”本身。"
 rikk_mdlc_wm_event.120.name: "戴森接收器缺乏能源！"
 rikk_mdlc_wm_event.120.desc: "戴森偏转器没有产生足够的能量供反射器正常运作，反而开始从电网中大量抽取能量！"
 rikk_mdlc_wm_event.120.a: "收到数据，正在计算应对措施"
 rikk_mdlc_tradition_geoscaping: "地质景观塑造"
 rikk_mdlc_tradition_geoscaping_desc: "要真正掌握创造世界型巨械的技艺，对行星的操控必不可少。"
 rikk_mdlc_tr_geoscaping_1: "加速部署学说"
 rikk_mdlc_tr_geoscaping_1_delayed: "我们可以在项目启动之前，利用世界型巨械根系的每一级，将后续项目所需的材料精确地预先存放在它们需要的位置上。"
 rikk_mdlc_tr_geoscaping_1_desc: "世界型巨械中每建成一级§Y世界型巨械根系§!，都将提供一项可叠加增益——§Y决议颁布速度：§!§G+10%§!。"
 rikk_mdlc_tr_geoscaping_2: "环境改造应用学说"
 rikk_mdlc_tr_geoscaping_2_delayed: "我们为常规环境改造所开发的技术与方法，同样可以应用于世界型巨械的极端环境改造流程。"
 rikk_mdlc_tr_geoscaping_3: "积累经验"
 rikk_mdlc_tr_geoscaping_3_delayed: "与其清除世界型巨械核心在运行升级程序时生成的专用缓存，不如将它们转移至其他核心，以便将习得的策略复制推广。"
 rikk_mdlc_tr_geoscaping_3_desc: "§Y$rikk_mdlc_situation_core_core$§!局势获得：§G每月进度：+20%§!"
 rikk_mdlc_tr_geoscaping_4: "精磨技巧"
 rikk_mdlc_tr_geoscaping_4_delayed: "驾驭这些极端环境的方式应当更加温和，而不是粗暴地将环境“碾碎”以迫使其屈服。"
 rikk_mdlc_tr_geoscaping_4_desc: "由§S熔融、冰封或剧毒§!星球转化而来的世界型巨械将获得：\n§G添加1项正面效果的随机修正§!\n§g（不包括它们可能已有的随机修正）§!"
 rikk_mdlc_tr_geoscaping_5: "世界级巨作"
 rikk_mdlc_tr_geoscaping_5_delayed: "$rikk_mdlc_decision_world_machine_structured_world_desc$"
 rikk_mdlc_tr_geoscaping_5_desc: "解锁§Y$rikk_mdlc_decision_world_machine_structured_world$§!决议，带来以下效果：\n添加§Y$rikk_mdlc_d_world_machine_roots_5$§!资源点\n最大区划：§G+75%§!\n$mod_xvcv_mdlc_world_machines_districts_minerals_cost_add$：§R+100%§!"
 rikk_mdlc_tr_geoscaping_finisher_desc: "完成§Y$rikk_mdlc_decision_world_machine_structured_world$§!决议后，该工程所在的世界型巨械将获得：\n§S$MOD_PLANET_BUILDING_CAPACITY_ADD$：§!§G+1§!"
 rikk_mdlc_tr_geoscaping_adopt: "地质景观塑造传统"
 rikk_mdlc_tr_geoscaping_finish: "地质景观塑造传统"
 rikk_mdlc_tradition_zoning: "分区"
 rikk_mdlc_tradition_zoning_desc: "我们打造的世界型巨械越多，便越能受益于日益深化的专精。"
 rikk_mdlc_tr_zoning_1: "深层存储"
 rikk_mdlc_tr_zoning_1_delayed: "为了应对星球的不断扩张，必须将存储天量物资的问题考虑在内。只需对核心的区划模板稍作修改，我们就能腾出一整个区划，专门用于部署货物物流系统。"
 rikk_mdlc_tr_zoning_1_desc: "解锁§Y$rikk_mdlc_wm_zone_storage$§!特区，可用于所有非计算区划。"
 rikk_mdlc_tr_zoning_2: "高维护资源采集"
 rikk_mdlc_tr_zoning_2_delayed: "原材料生产区由一个高度优化的预算系统管理。通过植入代码片段，我们可以修改其预算，使其忽略那些能提升33%基础产出的，高度专业化但价格高昂的设备。"
 rikk_mdlc_tr_zoning_2_desc: "获得一项已完成90%的§C科技选项§!，提供§Y$rikk_mdlc_zone_gas_generator$§!、§Y$rikk_mdlc_zone_crystalline_scanning$§!和§Y$rikk_mdlc_zone_mote_fertilizing$§!特区——它们可用于自动机械星球的原始资源区划。\n这些特区可使行星的£energy£·£minerals£·£food£产出额外提升§G10%§!。"
 rikk_mdlc_tr_zoning_3: "一级区划改造"
 rikk_mdlc_tr_zoning_3_delayed: "世界型巨械核心内一级区域和冷却区域的设计图表明，我们可以在特定区域制造一套专用模块，从而对这颗星球进行彻底的改造。制造这些模块非常昂贵，会消耗我们的特殊资源，但产能评估表明，这项投资将是物有所值的。"
 rikk_mdlc_tr_zoning_3_desc: "获得一项已完成90%的§C科技选项§!，提供§Y$rikk_mdlc_zone_gas_processes$§!、§Y$rikk_mdlc_zone_crystal_construction$§!和§Y$rikk_mdlc_zone_mote_capacitors$§!特区——它们可用于一级区划和冷却区划。\n这些特区的基础$sr_with_icon$维护费会降低§G10%§!。"
 rikk_mdlc_tr_zoning_4: "奇异资源统合"
 rikk_mdlc_tr_zoning_4_delayed: "我们的世界型巨械蕴含着如此伟岸的力量，以一整个世界的伟力为后盾，那些寻常帝国连想都不敢想的工业构想，在这里都能化作现实。"
 rikk_mdlc_tr_zoning_4_desc: "获得若干§C研究选项§!，其所提供的特区可以产出或利用§S奇异资源§!。若已通过§L纳米机器人§!或§g模块化§!飞升获得了相应能力，将不会重复获得相关的科技选项。\n§S奇异资源§!生产特区的产出：§G+1§!"
 rikk_mdlc_tr_zoning_5: "世界级奇观"
 rikk_mdlc_tr_zoning_5_delayed: "统合整个世界型巨械的各种功能，正受制于日益分散的注意力机制。鉴于目前我们已建成足够多的世界型巨械，建造中央服务器枢纽来集中处理这些功能的构想，已完全可以提上日程。"
 rikk_mdlc_tr_zoning_5_desc: "新增若干§C科技选项§!，可提供存在§R帝国上限§!的特区，它们可以带来§G影响全帝国的修正§!或其他强力效果。\n§S$rikk_mdlc_zone_pc_machine_ser_empire_size$§!帝国上限：§G+2§!"
 rikk_mdlc_tr_zoning_adopt: "分区传统"
 rikk_mdlc_tr_zoning_finish: "分区传统"
 rikk_mdlc_wm_event.55.name: "环世界转换！"
 rikk_mdlc_wm_event.55.desc: "§H星系中的自动环世界发生了一些变化！§!\n作为补偿，请收下这些东西：一笔小小的退款，以及自动环世界建造速度的提升。\n§P请务必取消整个建造队列！\n不仅仅是损坏的建筑，而是全部！§!"
 rikk_mdlc_wm_event.55.a: "好吧……"
 rikk_mdlc_wm_event.55.a.tt: "你的自动环世界获得持续1年的修正：§G建造时间：-90%§!。"
