 oxr_mdlc_zone_pc_machine_cpu_dark_matter_drawing: "$oxr_mdlc_gear$暗物质提取"
 oxr_mdlc_zone_pc_machine_cpu_dark_matter_drawing_desc: "$oxr_mdlc_zone_configure_for_text$£sr_dark_matter£生产。\n通过对特殊处理的暗物质团块注入能量并施加引力涡旋，可激发其生长并进行采集。$oxr_mdlc_zone_unique_to_cpu$"
 oxr_mdlc_zone_pc_machine_cpu_living_metal_breeding: "$oxr_mdlc_gear$活体金属繁殖"
 oxr_mdlc_zone_pc_machine_cpu_living_metal_breeding_desc: "$oxr_mdlc_zone_configure_for_text$£sr_living_metal£生产。\n通过密集轰击快子并过量投喂与其相似的分子结构，可以人为诱导活体金属进行增殖，使其突破其原始尺寸。$oxr_mdlc_zone_unique_to_cpu$"
 oxr_mdlc_zone_pc_machine_cpu_nanite_feeding: "$oxr_mdlc_gear$纳米机器人饲喂"
 oxr_mdlc_zone_pc_machine_cpu_nanite_feeding_desc: "$oxr_mdlc_zone_configure_for_text$£nanites£生产。\n令人意外的是，只要对原理拥有正确的理解，便能轻而易举地扩增纳米机器人。若是通过破解接口强行使其增殖，则仅能达到5%的效果。$oxr_mdlc_zone_unique_to_cpu$"