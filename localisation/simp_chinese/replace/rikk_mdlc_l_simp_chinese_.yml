 oxr_mdlc_zone_pc_machine_auto_archive_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于分析行星表面收集的各类数据日志。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_science: "$oxr_gear2$ 分形生成器"
 oxr_mdlc_zone_pc_machine_auto_science_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于生成分形算法，以此作为科学创新工作的替代品。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_engineering: "$oxr_gear2$ 工程学生成器"
 oxr_mdlc_zone_pc_machine_auto_engineering_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于生成分形算法，专精于研究现实世界中物质的排布规律。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_physics: "$oxr_gear2$ 物理学生成器"
 oxr_mdlc_zone_pc_machine_auto_physics_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于生成分形算法，专精于宇宙物理规律的探索和运用研究。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_society: "$oxr_gear2$ 社会学生成器"
 oxr_mdlc_zone_pc_machine_auto_society_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于生成分形算法，专精于建构智慧生命的交流模型。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_unity: "$oxr_gear2$ 干涉发生器"
 oxr_mdlc_zone_pc_machine_auto_unity_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 将算力用于对中央网络的主机系统进行整理、优化与清理。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_trade: "$oxr_gear2$ 后勤区域"
 oxr_mdlc_zone_pc_machine_auto_trade_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 为后勤任务分配空间，提供大型运输区域和进出口运转能力。$oxr_mdlc_zone_common_to_primary$"
 oxr_mdlc_zone_pc_machine_auto_army: "$oxr_gear2$ 自动化防御工事"
 oxr_mdlc_zone_pc_machine_auto_army_desc: "这款 ['concept_oxr_mdlc_wm_district_module_array'] 为大规模军事用途分配空间，包括搭建自动化防御设施和军用飞船的后勤支持设施。$oxr_mdlc_zone_common_to_primary$"
