 oxr_mdlc_zone_pc_machine_cpu_nanite_feeding_desc: "$oxr_mdlc_zone_pc_machine_ecu_nanite_feeding_desc$"
 rikk_mdlc_tech_rare_raw_zones: "原始资源开支"
 rikk_mdlc_tech_rare_raw_zones_desc: "$rikk_mdlc_tr_zoning_2_delayed$"
 rikk_mdlc_tech_rare_raw_zones_tooltip: "解锁§Y$rikk_mdlc_zone_gas_generator$§!、§Y$rikk_mdlc_zone_crystalline_scanning$§!和§Y$rikk_mdlc_zone_mote_fertilizing$§!特区，可用于自动机械星球的原始资源区划。"
 rikk_mdlc_tech_rare_primary_zones: "主要资源开支"
 rikk_mdlc_tech_rare_primary_zones_desc: "$rikk_mdlc_tr_zoning_3_delayed$"
 rikk_mdlc_tech_rare_primary_zones_tooltip: "解锁§Y$rikk_mdlc_zone_gas_processes$§!、§Y$rikk_mdlc_zone_crystal_construction$§!和§Y$rikk_mdlc_zone_mote_capacitors$§!特区，可用于一级区划和冷却区划。"
 rikk_mdlc_zone_nanite_structures: "$oxr_mdlc_gear$纳米建造"
 rikk_mdlc_zone_nanite_structures_desc: "使用纳米机器人进行建造，已接近那种仅凭意愿便可创造一切的理想建造技术。能达到这一步，我们就知足了。"
 rikk_mdlc_tech_dark_matter_integration: "暗物质整合"
 rikk_mdlc_tech_dark_matter_integration_desc: "收集和利用暗物质的技术已触手可及——现在，下一步是将其付诸实践。"
 rikk_mdlc_tech_dark_matter_integration_tooltip: "解锁世界型巨械特区，用于收集和使用§M$sr_dark_matter_with_icon$§!"
 rikk_mdlc_tech_living_metal_integration: "活体金属整合"
 rikk_mdlc_tech_living_metal_integration_desc: "收集和利用活体金属的技术已触手可及——现在，下一步是将其付诸实践。"
 rikk_mdlc_tech_living_metal_integration_tooltip: "解锁世界型巨械特区以收集和使用§g$sr_living_metal_with_icon$§!"
 rikk_mdlc_tech_nanites_integration: "纳米整合"
 rikk_mdlc_tech_nanites_integration_desc: "收集和利用活纳米机器人的技术已触手可及——现在，下一步是将其付诸实践。"
 rikk_mdlc_tech_nanites_integration_tooltip: "解锁世界型巨械特区以收集和使用§L$nanites_with_icon$§!"
 rikk_mdlc_tech_zro_integration: "泽珞整合"
 rikk_mdlc_tech_zro_integration_desc: "收集和利用活泽珞的技术已触手可及——现在，下一步是将其付诸实践。"
 rikk_mdlc_tech_zro_integration_tooltip: "解锁世界型巨械特区，用于收集和使用§B$sr_zro_with_icon$§!"
 oxr_mdlc_zone_pc_machine_ecu_dark_matter_drawing: "$oxr_mdlc_gear$暗物质提取"
 oxr_mdlc_zone_pc_machine_ecu_dark_matter_drawing_desc: "$oxr_mdlc_zone_configure_for_text$£sr_dark_matter£生产。\n通过向一团被特殊约束的暗物质中掺杂能量并施加引力涡旋，即可刺激该团块的生长并从中进行提取。$oxr_mdlc_zone_unique_to_ecu$"
 oxr_mdlc_zone_pc_machine_ecu_living_metal_breeding: "$oxr_mdlc_gear$活体金属繁殖"
 oxr_mdlc_zone_pc_machine_ecu_living_metal_breeding_desc: "$oxr_mdlc_zone_configure_for_text$£sr_living_metal£生产。\n通过快子的大规模轰击以及过度喂食与其自身相似的分子结构，可以人工诱使活体金属增殖至超越其原本尺寸。$oxr_mdlc_zone_unique_to_ecu$"
 oxr_mdlc_zone_pc_machine_ecu_nanite_feeding: "$oxr_mdlc_gear$纳米机器人饲喂"
 oxr_mdlc_zone_pc_machine_ecu_nanite_feeding_desc: "$oxr_mdlc_zone_configure_for_text$£nanites£生产。\n有了正确的了解，纳米机器人复制起来就毫不费力。否则，若是通过被破解的接口操作，速度将会慢上一个数量级。$oxr_mdlc_zone_unique_to_ecu$"
 rikk_mdlc_tech_zone_ser_empire_size: "帝国协同集中化"
 rikk_mdlc_tech_zone_ser_empire_size_desc: "随着帝国版图不断蔓延，机械智能的注意负载也随之攀升。一台高度特化的世界型巨械计算机可用于分担庞大运算网络的部分负荷。"
 rikk_mdlc_tech_zone_ser_empire_size_tooltip: "该§B$xvcv_mdlc_pc_machine_ser$§!特区会减少§E帝国规模§!。"
 rikk_mdlc_tech_zone_ser_building_cap: "帝国建设后勤学"
 rikk_mdlc_tech_zone_ser_building_cap_desc: "帝国的建设能力在根本层面上受到制约。一台高度特化的世界型巨械计算机可用于突破这一根本限制。"
 rikk_mdlc_tech_zone_ser_building_cap_tooltip: "该§B$xvcv_mdlc_pc_machine_ser$§!特区会提升§Y帝国的建造队列容量§!。"
 rikk_mdlc_tech_zone_ser_influence: "帝国决策指令"
 rikk_mdlc_tech_zone_ser_influence_desc: "帝国的意志执行力在根本层面上受到制约。一台高度特化的世界型巨械计算机可用于增强中枢单元所能调动的力量。"
 rikk_mdlc_tech_zone_ser_influence_tooltip: "该§B$xvcv_mdlc_pc_machine_ser$§!特区可产出§r影响力§!。"
 rikk_mdlc_tech_zone_ecu_speed_mult: "帝国亚光速推进方案"
 rikk_mdlc_tech_zone_ecu_speed_mult_desc: "受限于推进器反应物需要源源不断的供应，我们的舰队不得不在效率与动力之间稍作妥协。一台高度特化的世界型巨械军事复合体可用于管理舰队后勤并制造燃料，从而突破这一根本限制。"
 rikk_mdlc_tech_zone_ecu_speed_mult_tooltip: "该§R$xvcv_mdlc_pc_machine_ecu$§!特区可提升§P舰船基础速度§!。"
 rikk_mdlc_tech_zone_ecu_shipyard: "行星船坞"
 rikk_mdlc_tech_zone_ecu_shipyard_desc: "建设舰队是一个漫长的过程，必须在深空平台才能进行。尽管星环基地的出现提供了另一条途径，但其船坞模块的空间依然有限。一台高度特化的世界型巨械军事复合体可以充当一种解决方案——先在地面工厂中建造舰队，再于星环基地上完成最终组装。"
