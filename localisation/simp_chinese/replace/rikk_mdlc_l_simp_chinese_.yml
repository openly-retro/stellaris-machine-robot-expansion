l_simp_chinese:
 rikk_mdlc_decision_rw_upgrade: "环世界支撑结构"
 rikk_mdlc_decision_rw_upgrade_desc: "分段的环世界更适合传统社会，但我们已经作出判断：统一的平台更适合我们的现实情况。"
 rikk_mdlc_decision_rw_upgrade_effect: "将这个未殖民区段变为§R非宜居区段§!，以此§G提升同一环世界中的其他区段的行星尺寸§!。\n§Y提升的数量相当于损失区划数乘以66%，再除以剩余的环世界区段数。§!\n§R这会增加区划的花费和维护费。§!"
 rikk_mdlc_decision_rw_upgrade_fail_colonized: "§R必须对这个环世界的一个区段进行殖民。§!"
 rikk_mdlc_decision_rw_upgrade_fail_uncolonized: "§R该区段必须处于未殖民状态。§!"
 rikk_mdlc_decision_rw_upgrade_dummy: "不宜居环世界升级"
 RIKK_MDLC_RW_UPGRADED: "§Y$RIKK_MDLC_RW_UPGRADE_TARGET$§!已被转化为环世界支撑结构"
 rikk_mdlc_pc_ringworld_upgrade: "升级区段"
 rikk_mdlc_decision_rw_upgrade_dummy_desc: "$rikk_mdlc_decision_rw_upgrade_desc$"
 rikk_mdlc_rw_upgrade_modifier: "紧凑环世界区段"
 rikk_mdlc_rw_upgrade_modifier_desc: "这个环世界区段的密度有所增加，因而导致建筑成本与维护成本大幅提升，但紧密的结构有助于缩减建造时间。"
 rikk_mdlc_rw_upgrade_in_progress: "升级为支撑区段"
 rikk_mdlc_pc_ringworld_upgrade_desc: "被设置用于为其它宜居区段提供后勤支持和拓展槽位的环世界区段。"
 rikk_mdlc_rw_upgrade_in_progress_desc: "完工后，这个环世界区段的可居住表面会被分配给剩余的环世界殖民地。这些殖民地可以利用该区段的基础设施，进行超出标准限值的扩张。"
 rikk_mdlc_zone_swap_tt: "§H替换所有区划生产§!"
 mod_rikk_mdlc_world_machine_districts_efficiency: "世界型巨械区划效率"
 mod_rikk_mdlc_world_machine_districts_base_production: "世界型巨械区划基础产能"
 mod_rikk_mdlc_world_machine_cooling_district_effectiveness: "世界型巨械冷却区划效能"
 rikk_mdlc_zone_gas_generator: "$oxr_mdlc_gear$异星天然气发电"
 rikk_mdlc_zone_gas_generator_desc: "在能源生产流程中使用异星天然气令我们能从相同数量的投入资源中获得更高的产出。这些不可替代的异星天然气同时在流程中的不同环节分别作为催化剂和反应组分。"
 rikk_mdlc_zone_crystalline_scanning: "$oxr_mdlc_gear$晶体扫描"
 rikk_mdlc_zone_crystalline_scanning_desc: "通过专用扫描设备向装填了稀有水晶的地下标记物发射探测信号，我们能够更快地锁定优质矿脉。"
 rikk_mdlc_zone_mote_fertilizing: "$oxr_mdlc_gear$ 易爆微粒肥料"
 rikk_mdlc_zone_mote_fertilizing_desc: "配备大面积温控种植区，并施加高浓度的易爆微粒气态肥料制剂，极大地提升了生产效率。"
 rikk_mdlc_zone_mote_capacitors: "$oxr_mdlc_gear$ 易失性电容器"
 rikk_mdlc_zone_mote_capacitors_desc: "在将电容器放大到世界型巨械的尺寸时，会出现各种规模适配方面的问题。这通常可通过设置电容器组解决，但我们可以利用易爆微粒维持一种特定的平衡态，让电力设施的体积更加紧凑，进而安装更多的计算设备。"
 rikk_mdlc_zone_gas_processes: "$oxr_mdlc_gear$ 特种加工"
 rikk_mdlc_zone_gas_processes_desc: "使用异星天然气可以大幅提升各类金属冶炼与生产制造工艺的效率，并且该气体还可作为高性能燃料助燃剂，在交通运输至工业生产的全领域得到应用。"
 rikk_mdlc_zone_cooling_towers: "$oxr_mdlc_gear$ 冷却塔"
 rikk_mdlc_zone_cooling_towers_desc: "这些晶态结构的巨塔直抵高层大气，通过释放异星天然气形成云层，将热量从行星表面散至太空。气体携带的热量散尽后，就会液化并降落到地表；专用收集装置会将这些“雨水”收集起来，经微粒技术热循环装置处理后，再次循环释放至大气层中。"
 rikk_mdlc_fail_crust_roots_built: "§H 地壳根 §! §R 必须通过决议建造 §!"
 rikk_mdlc_zone_crystal_construction: "$oxr_mdlc_gear$ 稀有水晶建造"
 rikk_mdlc_zone_crystal_construction_desc: "使用特定工艺处理稀有水晶，实现分子层面的重构后，其会展现出极为优异的结构特性。其强度数倍于常规建筑材料，因而可以节省用料，使大规模建筑工程更快落成。"
 rikk_mdlc_zone_living_metal_structures: "$oxr_mdlc_gear$ 活体金属结构"
 rikk_mdlc_zone_living_metal_structures_desc: "高大的垂直建筑会面临严重的长期应力侵蚀问题。加入活性金属后，应力造成的损伤能在短期内完成自我修复，使我们能够修建更高、更密集的建筑群。"
 rikk_mdlc_zone_dark_matter_reactor: "$oxr_mdlc_gear$ 暗物质反应堆"
 rikk_mdlc_zone_dark_matter_reactor_desc: "在世界型巨械建筑中使用暗物质，能够打造出极高密度的能源基础设施，其输出的能量远超单颗行星通常所能承载的极限。"
 rikk_mdlc_tech_rare_resource_synthesizer: "稀有资源合成"
 rikk_mdlc_tech_rare_resource_synthesizer_desc: "人工合成稀有资源的构想，长久以来备受探讨 —— 活体金属、暗物质、纳米机器人，乃至泽珞皆在此列。但其可行性究竟如何，目前尚无定论。"
 rikk_mdlc_tech_rare_resource_synthesizer_tooltip: "任何已研发相应开采§S科技§!的§H稀有资源§!，都可解锁一个专属的§R$xvcv_mdlc_pc_machine_ecu$§!或§B$xvcv_mdlc_pc_machine_cpu$§!§H特区§!。"
 oxr_mdlc_zone_pc_machine_ecu_zro_summoning: "$oxr_mdlc_gear$ 泽珞召唤"
 oxr_mdlc_zone_pc_machine_ecu_zro_summoning_desc: "生产 $oxr_mdlc_zone_configure_for_text$ £sr_zro£\n尽管相关原理尚不明确，但只要掌握少量泽珞样本，就能强行开启通往泽珞之 “本源维度” 的跨维度虫洞，并从中汲取更多该物质。 $oxr_mdlc_zone_unique_to_ecu$"
