 xvcv_mdlc_config.1.desc: "本模组提供了帮助玩家游玩的实用功能。您可以在这一页打开或关闭这些功能。\n\n机器人→机械物种的转化§Y每年§!进行一次，只在§B机械智能国家§!进行。\n机械→机器人物种的转化§Y每年§!进行一次，只在§G合成飞升国家§!进行。\n\n物种合并会把被转化物种并入我们的创始物种，并将我们所有的机械和机器人物种都变成创始物种的一个亚种。这一过程§Y每年§!进行一次。\n\n自动人口迁移§Y每月§!进行一次，只在§B机械智能§!或§G合成飞升§!国家进行，且不考虑目标人口的宜居度。\n\n-----------\nMOD版本：§M3.1.0§!\n适配群星版本：§H4.3.X§!"
 xvcv_mdlc_config.1.desc_old: "\n\n全国§R失业人口总量§!：§R[This.xvcv_mdlc_empire_all_unemployed_pops_count_var]§!\n全国可用§G岗位总量§!：§G[This.xvcv_mdlc_empire_all_free_jobs_count_var]§!\n全国可用§B住房总量§!：§B[This.xvcv_mdlc_empire_all_free_housing_count_var]§!"
 xvcv_mdlc_config.1.name: "模组配置：第1页"
 xvcv_mdlc_config.to_credits_page: "§C前往$xvcv_mdlc_config.99.name$§!"
