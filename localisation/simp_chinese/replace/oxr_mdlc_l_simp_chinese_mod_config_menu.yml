 oxr_mdlc_mod_config_remove_old_ecu_deposits.name: "移除过时的世界型巨械资源点"
 oxr_mdlc_mod_config_remove_old_ecu_deposits.tooltip: "自模组版本3.0.9起，自动服务器与自动熔炉世界不再依赖资源点来提供特定国家修正（例如海军容量区划）。该效果将循环遍历各行星并对其进行清理，确保行星状态焕然一新。\n此效果将立即执行且无需确认。它不会破坏游戏过程，仅会清除那些过时的资源点。"
 xvcv_mdlc_config.4.name: "4—实验性功能"
 xvcv_mdlc_config.99.desc: "制作人员及鸣谢：\n\n—XVCV：本模组原作者，我向他致以感谢\n—Legit-Rikk：重构mute的《Extended Machines》模组，并开发了世界型巨械升级机制\n—FlantingCort、Krukal与鸽组汉化：感谢对本模组中文翻译的维护工作\n\n—Stellaris Modding Den社区的成员们：感谢#modding-help和#moddev-forum频道的技术支持\n—#machine-robots-xpac频道的支持者们：感谢你们的热情参与、头脑风暴，以及在我过度狂想时及时拉回正轨\n—创意工坊活跃用户：感谢你们的反馈与错误报告，我将持续跟进优化\n\n——Openly Retro：感谢他为维护本模组的付出"
 xvcv_mdlc_config.99.name: "模组开发人员与鸣谢"
