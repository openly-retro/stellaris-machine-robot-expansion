l_simp_chinese:
 rikk_mdlc_pc_battery: "有机发电星球"
 rikk_mdlc_pc_battery_desc: "工业化畜牧业的超高密度动物养殖场已经达到了新的水平——一颗毫无环境风险的巨大星球，受其支持，数目不可估量的有机生物得以维持神经的高度活跃。我们可以从中收获巨大的能量。"
 rikk_mdlc_decision_battery_world: "$rikk_mdlc_pc_battery$"
 rikk_mdlc_decision_battery_world_desc: "$rikk_mdlc_tech_battery_world_desc$"
 rikk_mdlc_decision_battery_world_effects: "将该行星转化为§Y$rikk_mdlc_pc_battery$§!：一颗专门用于将人口并入电网的星球。拥有§Y60%§!的最低宜居性和特殊的§Y住房§!、§Y舒适度§!、§Y犯罪度§!和§P加工§!区划。"
 rikk_mdlc_decision_un_battery_world: "撤销星球建制"
 rikk_mdlc_decision_un_battery_world_desc: "我们已经不再需要大规模的并入电网了。"
 rikk_mdlc_tech_battery_world: "有机发电殖民地"
 rikk_mdlc_tech_battery_world_desc: "大规模电网整合以及为发电而容纳大量有机体的做法，预计会随着数量的增长而引发更多问题。我们应当设计一个模板世界，用以容纳相当于整个帝国之多的有机体。"
 rikk_mdlc_tech_battery_world_effect: "$rikk_mdlc_tech_battery_world_desc$"
 rikk_mdlc_district_battery_quarters: "超高密度住宅"
 rikk_mdlc_district_battery_quarters_plural: "超高密度住宅"
 rikk_mdlc_district_battery_quarters_desc: "每个超高密度住宅都可以轻而易举地容纳数万个有机生命，而每个区划最少也能容纳数万座该住宅。"
 rikk_mdlc_district_battery_amenities: "分配设施"
 rikk_mdlc_district_battery_amenities_plural: "分配设施"
 rikk_mdlc_district_battery_amenities_desc: "这些位于战略区域的设施旨在最大化营养分配效率——这是维持生命体征所不可或缺的一大要素。"
 rikk_mdlc_battery_wmo_amenity_district_versatility_desc: "§Y完成普适传统树会将该区划产出的舒适度提升至2000。§!"
 rikk_mdlc_district_battery_crime: "镇压单位"
 rikk_mdlc_district_battery_crime_plural: "镇压单位"
 rikk_mdlc_district_battery_crime_desc: "这些单位的部署分割了所有主干道。有机区划居民的一举一动都处在他们的密切监视之中。所有单位都配备了移动能量收获装备，后者可能导致的可怕后果降低了犯罪率。"
 rikk_mdlc_district_battery_processing: "加工厂"
 rikk_mdlc_district_battery_processing_plural: "加工厂"
 rikk_mdlc_district_battery_processing_desc: "加工厂星星点点的分布在这颗行星之上，巨大的行星电网使其彼此相连。每个工厂的接入都会提升该电网的效率。"
 rikk_mdlc_zone_battery_military_primary: "$oxr_mdlc_zone_pc_machine_auto_army$"
 rikk_mdlc_zone_battery_military_primary_desc: "$oxr_mdlc_zone_pc_machine_auto_army_desc$"
 rikk_mdlc_zone_suppression_unit: "镇暴单位"
 rikk_mdlc_zone_suppression_unit_desc: "由无人机组成的舰队持续在住宅区域中搜索任何反常活动的踪迹，严苛的宵禁和其他准则消灭了一切犯罪活动。"
 rikk_mdlc_zone_cooperation_unit: "合作单位"
 rikk_mdlc_zone_cooperation_unit_desc: "建立数千个由未加工的有机生命管理的小型地区附属政府，让他们体会有名无实的控制感。"
 rikk_mdlc_zone_abundancy_protocols: "富裕协议"
 rikk_mdlc_zone_abundancy_protocols_desc: "只要给他们一点光芒和一些华而不实的小玩意儿，再加上一点化学刺激，他们就会不加思索地接受自己得到的一切。"
 rikk_mdlc_zone_amenity_support: "舒适度支持"
 rikk_mdlc_zone_amenity_support_desc: "支持舒适度生产，以此来让被打包的有机生命少些抱怨。"
 rikk_mdlc_zone_increased_processing: "增量处理"
 rikk_mdlc_zone_increased_processing_desc: "终止人口的自由增长，转而从新人口身上提取化学能量。"
 rikk_mdlc_zone_moderated_processing: "中度处理"
 rikk_mdlc_zone_moderated_processing_desc: "停止绝户式的化学能量提取，减少被提取者中儿童的数量。"
 rikk_mdlc_building_battery_descriptor: "§S生物发电星球特殊建筑§!"
 rikk_mdlc_building_battery_processing: "有机处理设施"
 rikk_mdlc_building_battery_processing_desc: "进入该星球的所有有机生命都将在这个建筑中接受监视芯片的植入，随后被送入指定的住宅区划。芯片系统监视着携带者的健康和所处位置，确认几乎每个个体的最低进食量并进行一对一最优效率调整。"
 rikk_mdlc_building_battery_habitability_1: "环境容纳设施"
 rikk_mdlc_building_battery_habitability_1_desc: "尽管该行星上的设施已经足够供当地物种栖居，但更强力的系统可以应对更多特定的环境。"
 rikk_mdlc_building_battery_habitability_2: "环境完美化设施"
 rikk_mdlc_building_battery_habitability_2_desc: "比邻而建的完美环境控制系统，任何物种都可以适应其中的环境。其唯一缺点就是极高的成本。"
 rikk_mdlc_building_battery_specialty: "神经计算网"
 rikk_mdlc_building_battery_specialty_desc: "极为复杂的神经连接设施。利用被束缚在能量提取设备上的有机生命进行对万物的计算。"
 rikk_mdlc_building_battery_specialty_effects: "§Y基于建成后解锁的四种特殊殖民地类别提供不同的帝国修正。修正和维护费会随着并入电网的人口数不断增多，直至上限§!"
 rikk_mdlc_col_battery_plain: "能源提取星球"
 rikk_mdlc_col_battery_plain_desc: "增加£energy£§S能量币§!产出"
 rikk_mdlc_col_battery_plain_tt: "该星球的有机生命被严丝合缝地捆在化学能量提取器上，用自己的身体为帝国产生些微的能量。"
 rikk_mdlc_col_battery_science: "科研倍增星球"
 rikk_mdlc_col_battery_science_desc: "$rikk_mdlc_building_battery_specialty$产生§S$RESEARCH_EFFICIENCY$§!的倍数增益"
 rikk_mdlc_col_battery_science_tt: "由有机神经网进行算法运作中难以完成的模式识别和数据推算。"
 rikk_mdlc_col_battery_unity: "统一思维星球"
 rikk_mdlc_col_battery_unity_desc: "$rikk_mdlc_building_battery_specialty$产生§S$mod_country_base_unity_produces_add$§!的倍数增益"
 rikk_mdlc_col_battery_unity_tt: "有机体的思维——尤其是在睡梦状态中——能更自然地产生改善整体所必须的创造力。"
 rikk_mdlc_col_battery_navy: "后勤计算星球"
 rikk_mdlc_col_battery_navy_desc: "$rikk_mdlc_building_battery_specialty$产生§S$concept_naval_capacity$§!的倍数增益"
 rikk_mdlc_col_battery_navy_tt: "舰队后勤的组织工作枯燥无聊，但博采众议仍可带来单个智能无法想出的组织性解决方案。"
 rikk_mdlc_col_battery_empire_size: "帝国效率星球"
 rikk_mdlc_col_battery_empire_size_desc: "$rikk_mdlc_building_battery_specialty$产生§S$concept_empire_size$减少§!的倍数增益"
 rikk_mdlc_col_battery_empire_size_tt: "以“游戏”的方式为有机体提供高度复杂的组织“模拟”。"
 rikk_mdlc_battery_world_districts: "有机发电星球"
 rikk_mdlc_category_district_battery_quarters: "超高密度住宅区划"