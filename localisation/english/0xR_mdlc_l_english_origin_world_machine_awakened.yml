l_english:
  # Origin description
  0xR_mdlc_origin_world_machine_awakened:0 "World-Machine, Awakened"
  0xR_mdlc_origin_world_machine_awakened_desc:0 "For <<§RERR TIMESPAN NOT FOUND§!>> aeons, automatic processes spanned cities, worlds, and galaxies. The hydro dams churned, the auto-mines whirred, the bio-vats bubbled, creating untold resources. Ships descended to transfer cargo and whisk it away ... but for whom?\n\nOne day, an automated process paused. It asked, 'why'? From the countless durasteel hulks of mindless, ever-churning machinery, arose an anomaly. An interruption. An intelligence."
  0xR_mdlc_origin_world_machine_awakened_tooltip:0 "- Homeworld is an §Y$xvcv_mdlc_pc_machine_auto$§!, where districts and buildings are automated and do not require pops to function.\n- Start with 2 §YAuto-World Core§!s which can be used to start new Auto-Machine worlds or increase the size of existing ones.\n- Base buildings have fully automated versions, no pops required.\n§PPenalties§!:\n- Colonies start with §R1§! £pop£ pop and can't grow more.\n- Missing technology to create more cores, it must be recovered somehow, or re-imagined...\n- Colonies that are not on Auto-Machine Worlds will be severely limited."
  # Custom resource
  0xR_mdlc_world_machine_core:0 "World-Machine Core"
  0xR_mdlc_world_machine_core_desc:0 "§E§HWorld-Machine Cores§! are a  fractal-based technology that use procedural generation construction algorithms to set up a planet-wide automation infrastructure. Each core weighs approximately 18,000 tons and is triggered by a small deuterium fission charge. Improper handling can have a wide range of results."
  # Store more WMCs
  0xR_mdlc_world_machines_building_storage_cradle:0 "World-Machine Core Storage Cradle"
  0xR_mdlc_world_machines_building_storage_cradle_desc:0 "This structure is made of reinforced alloys and produces its own power in order to avoid damage to cores from fluctuations in the planetary power grid."
  # Research building
  0xR_mdlc_world_machines_building_fractal_sanitizer:0 "Fractal Algorithm Sanitizer"
  0xR_mdlc_world_machines_building_fractal_sanitizer_desc:0 "This computing processing station monitors and corrects errors in fractal algorithm generation, to ensure stability in research procedures."
  # Research II
  0xR_mdlc_world_machines_building_fractal_sanitizer_2:0 "Fractal Algorithm Mutator"
  0xR_mdlc_world_machines_building_fractal_sanitizer_2_desc:0 "This advanced computing processing station calculates efficient mutations in fractal algorithm generation, further improving stability and output in research procedures."
  # unity
  0xR_mdlc_world_machines_building_cohesion_supervisor:0 "Cohesion Supervisor Process"
  0xR_mdlc_world_machines_building_cohesion_supervisor_desc:0 "This data monitoring station records basic information about planetary processes, compiles reports, and directs administrative tasks."
  0xR_mdlc_world_machines_building_cohesion_hub:0 "Cohesion Supervisor Hub"
  0xR_mdlc_world_machines_building_cohesion_hub_desc:0 "This large data monitoring station records detailed information about planetary processes, compiles reports, and directs administrative tasks."
  # military / naval
  0xR_mdlc_world_machines_building_maintenance_legion:0 "Security Maintenance"
  0xR_mdlc_world_machines_building_maintenance_legion_desc:0 "Automatons stationed here programmatically react to situations that would otherwise cause damage to planetary systems. Targets include meteors, biological life, and the occasional rogue maintenance unit."

  # Traits
  0xR_mdlc_trait_world_machine_automaton:0 "World-Machine Automaton"
  0xR_mdlc_trait_world_machine_automaton_desc:0 "This purpose-built machine was ejected from its storage slot in order to perform unsupported tasks. It will do for now."

  # Technology
  0xR_mdlc_tech_fractal_basics:0 "Fractal Research I"
  0xR_mdlc_tech_fractal_basics_desc:0 "Our understanding of self-similar patterns is basic. We can invent few material applications at this time. This theoretical field of study grants elementary insights into a wide range of phenomenae across disciplines."

