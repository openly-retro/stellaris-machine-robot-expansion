# special projects 0x011

 OXR_MDLC_CONSOLIDATORS_STARTING_INFO: "Consolidation Directive"
 OXR_MDLC_CONSOLIDATORS_STARTING_INFO_DESC: "§GConsolidating Orbital Deposits§!:\n1. Use planetary decision in a system owned by our empire, to prepare resources for extraction. The target must have an orbital deposit that we can extract, and we may need advanced technology to move certain deposits.\n2. Complete the §Yspecial project§! created to extract the resources.\n3. A Mass Mover ship will be built and will transfer the resources to the §HOrbital Mining Target§!. Check where that is using the 'Orbital Mining Target' situation log.\n\n§GConsolidating Planetary Features§!:\n1. Use planetary decision in a system that we own, to prepare the planetary feature for extraction.\n2. Complete the §Yspecial project§! created to dig out and move the feature. This may take some time depending on the size of the feature.\n3. A Geo Mover ship will be automatically built and will move the feature to the §HPlanetary Consolidation Target§!\n§RTactical Advisory:§! Mass Mover and Geo Mover ships are vulnerable and the resources will be lost if the ships are destroyed!"
